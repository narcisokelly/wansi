<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document</title>

<style>
  body {
    height: 3000px; 
    font-family: Arial, sans-serif;
  }

  .xx
  {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 35px;
    height: 35px;
    background: black;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .box 
  {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    height: 180px;
    background: #df99b5;
  }

  .shirt
  {
    position: relative;
    display: inline-block;
    background: #dddddd;
    padding: 15px;
    margin: 80px;
  }

  .shirt img 
  {
    width: 280px;
    display: block;
  }

  .off
  {
    position: absolute;
    top: 15px;
    right: 15px;
    background: black;
    color: white;
    padding: 6px 12px;
    font-size: 14px;
  }


  .cart
  {
    position: absolute;
    bottom: 15px;
    left: 15px;
    right: 15px;
    background: rgba(255, 255, 255, 0.8);
    padding: 15px 0;
    text-align: center;
  }

  .cart
  {
    padding: 8px 15px;
    border: 1px solid black;
    background: white;
    cursor: pointer;
  }

</style>
</head>

<body>

<div class="xx">X</div>

<div class="shirt">
  <img src="shirt.jpg" alt="Shirt">

  <div class="off">20% OFF</div>

  <div class="cart">
    <button>Add to Cart</button>
  </div>
</div>

<!-- FIXED BOX -->
<div class="box"></div>

</body>
</html>
