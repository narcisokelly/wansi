<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Request for Proposal</legend>
        <table>
            <tr>
                <td>Your Company:</td>
                <td><input type="text" name="fn"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" name="fn"></td>
            </tr>
             <tr>
                <td>Username:</td>
                <td><input type="username" placeholder="type your username" name="fn"></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" placeholder="type your password" name="fn"></td>
            </tr>
           <tr>
            <td>Your business:</td>
            <td>
                <textarea placeholder="Briefly describe your business in this place."></textarea>
            </td>
            </tr>
            <tr>
                <td valign="top">Company size:</td>
                <td>
                    <input type="radio" name="size"> less than 10<br>
                    <input type="radio" name="size"> 11 to 50<br>
                    <input type="radio" name="size"> 50 to 200<br>
                    <input type="radio" name="size"> over 200
                </td>
            </tr>
        <tr>
            <td valign="top">Services:</td>
            <td>
                <input type="checkbox"> Brand Identity
                <input type="checkbox"> New Website
                <input type="checkbox"> Web Redesign
            </td>
        </tr>
        <tr>
        <td>Timeline:</td>
        <td>
            <select>
                <option> </option>
                <option>Immediately</option>
                <option>1-2 weeks</option>
                <option>3-6 weeks</option>
                <option>7-2 months</option>
            </select>
        </td>
        <tr>
            <td></td>
            <td>
                <input type="submit" value="Send to dev/design">
            </td>
        </tr>
        </table>
       

    </fieldset>
</body>
</html>
