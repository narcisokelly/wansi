<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLEX PART 2</title>

<style>

* 
{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


.container 
{
    border-top: 2px solid red;
    margin: 20px;
}


header, footer 
{
    background: palegoldenrod;
    padding: 20px;
    border-bottom: 2px solid maroon;
}


.main 
{
    display: flex;
    flex-direction: column; 
}


.left, .right {
    background: green;
    border: 2px solid yellow;
    padding: 40px 20px;
    width: 100%;
}


@media (min-width: 800px) {
    .main {
        flex-direction: row;
    }

    .left {
        width: 30%;
    }

    .right {
        width: 70%;
    }
}

@media (max-width: 400px) 
{
    .main {
        flex-direction: column;
    }

    .left, .right {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">
    <header>This is a Header</header>

    <div class="main">
        <div class="left">Section left-nav</div>
        <div class="right">Section right-nav</div>
    </div>

    <footer>This is a footer</footer>
</div>

</body>
</html>
